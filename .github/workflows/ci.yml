name: CI

on:
  push:
  pull_request:

jobs:
  quality-and-ml-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff
        run: python -m ruff check .

      - name: Pytest
        run: python -m pytest -q

      - name: Prepare demo data
        run: python scripts/prepare_demo_data.py --force

      - name: Train smoke
        run: python scripts/train_smoke.py --tracking-uri file:./mlruns

      - name: Register model
        run: python scripts/register_model.py --tracking-uri file:./mlruns

      - name: Promote model
        run: python scripts/promote_model.py --tracking-uri file:./mlruns

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eyewear-ml-smoke-artifacts
          path: |
            artifacts
            reports
