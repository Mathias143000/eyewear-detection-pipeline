services:
  edge:
    image: nginx:1.27-alpine
    container_name: eyewear-edge
    depends_on:
      - eyewear-api
    ports:
      - "18040:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  eyewear-api:
    build: .
    container_name: eyewear-api
    environment:
      EYEWEAR_MODEL_TYPE: baseline
      EYEWEAR_MODEL_PATH: /app/models/baseline_glasses.joblib
      EYEWEAR_MODEL_METADATA_PATH: /app/artifacts/serving_model.json
      EYEWEAR_LOG_PATH: /app/logs/api.log
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: eyewear-demo
      MLFLOW_REGISTERED_MODEL: eyewear-classifier
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      MODEL_ARTIFACT_BUCKET: eyewear-mlflow
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      AWS_DEFAULT_REGION: us-east-1
    depends_on:
      - mlflow
    expose:
      - "8000"
    volumes:
      - ./models:/app/models
      - ./artifacts:/app/artifacts
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: eyewear-postgres
    environment:
      POSTGRES_DB: mlflow
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
    ports:
      - "15440:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflow"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: quay.io/minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: eyewear-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "19140:9000"
      - "19141:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-03-12T17-29-24Z
    container_name: eyewear-minio-init
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin123; do sleep 1; done
        /usr/bin/mc mb --ignore-existing local/eyewear-mlflow
        /usr/bin/mc anonymous set private local/eyewear-mlflow

  mlflow:
    build: .
    container_name: eyewear-mlflow
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - postgresql://mlflow:mlflow@postgres:5432/mlflow
      - --artifacts-destination
      - s3://eyewear-mlflow
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      AWS_DEFAULT_REGION: us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "15040:5000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/', timeout=5).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 15

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: eyewear-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "19090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  loki:
    image: grafana/loki:2.9.9
    container_name: eyewear-loki
    command: -config.file=/etc/loki/config.yml
    ports:
      - "13100:3100"
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki

  promtail:
    image: grafana/promtail:2.9.9
    container_name: eyewear-promtail
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/eyewear

  grafana:
    image: grafana/grafana:11.1.0
    container_name: eyewear-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
      - loki
    ports:
      - "13040:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

volumes:
  postgres-data:
  minio-data:
  prometheus-data:
  loki-data:
  grafana-data:
